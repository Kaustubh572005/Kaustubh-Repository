<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PillPall - Your Medication Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-color: hsl(173, 80%, 40%); /* Bright Teal */
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0a0c1c;
            background-image:
                radial-gradient(at 27% 37%, hsla(215, 98%, 61%, 0.1) 0px, transparent 50%),
                radial-gradient(at 97% 21%, hsla(173, 70%, 50%, 0.1) 0px, transparent 50%),
                radial-gradient(at 82% 99%, hsla(239, 98%, 61%, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            color: #e2e8f0; /* slate-200 */
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6); /* slate-900 with opacity */
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.125);
        }

        .glow-button {
            box-shadow: 0 0 5px var(--glow-color), 0 0 10px var(--glow-color), 0 0 15px var(--glow-color);
        }

        /* Custom animation classes */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes slideOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(-100%); }
        }
        .animate-slideOut {
            animation: slideOut 0.5s ease-in forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            70% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .med-card {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .pill-taken {
            background: rgba(15, 23, 42, 0.4); /* Darker, less prominent */
            border-left-color: #4a5568; /* gray-600 */
        }
        .pill-taken .med-name, .pill-taken .med-dosage {
            text-decoration: line-through;
            opacity: 0.5;
        }

        /* Page transition styles */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.6s ease-out; }

        /* Nav link styles */
        .nav-link.active {
            color: #2dd4bf; /* teal-400 */
            text-shadow: 0 0 8px rgba(45, 212, 191, 0.7);
        }
        
        .mobile-nav .nav-link.active {
             color: #2dd4bf; /* teal-400 */
             background-color: rgba(45, 212, 191, 0.1);
        }
        
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-in-out;
        }
    </style>
</head>
<body class="pb-20 md:pb-0">
    
    <!-- Login View -->
    <div id="loginView">
        <main class="min-h-screen flex items-center justify-center animate-fadeIn p-4">
            <div class="w-full max-w-md p-8 space-y-8 glass-card">
                <div class="text-center">
                    <div class="flex justify-center items-center space-x-3 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-teal-400"><path d="M21 12h-6m-6 0H3m18 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/><path d="M12 21V3"/></svg>
                        <h1 class="text-4xl font-bold text-slate-100">PillPall</h1>
                    </div>
                    <h2 class="text-xl text-slate-300">Authorize Access</h2>
                    <p class="text-slate-400">Securely connect to your medication schedule.</p>
                </div>
                <form id="loginForm" class="space-y-6">
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-400">System ID</label>
                        <input id="email" name="email" type="email" autocomplete="email" required class="mt-1 w-full px-4 py-2 border border-slate-700 bg-slate-800/50 text-slate-200 rounded-lg focus:ring-2 focus:ring-teal-400 focus:border-teal-400 transition" placeholder="user@pillpall.io">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-400">Passcode</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" required class="mt-1 w-full px-4 py-2 border border-slate-700 bg-slate-800/50 text-slate-200 rounded-lg focus:ring-2 focus:ring-teal-400 focus:border-teal-400 transition" placeholder="••••••••">
                    </div>
                    <div>
                        <button type="submit" class="w-full bg-teal-500 text-white font-semibold py-3 px-4 rounded-lg hover:bg-teal-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-teal-400 transition-all duration-300 transform hover:scale-105 hover:glow-button">
                            Engage
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- App View -->
    <div id="appView" class="hidden">
        <!-- Header -->
        <header class="glass-card sticky top-0 md:top-4 md:mx-4 z-10">
            <div class="container mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-teal-400"><path d="M21 12h-6m-6 0H3m18 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/><path d="M12 21V3"/></svg>
                    <h1 class="text-2xl font-bold text-slate-100">PillPall</h1>
                </div>
                 <nav class="hidden md:flex items-center space-x-8">
                    <a href="#" class="nav-link text-slate-300 hover:text-teal-400 font-medium transition" data-page="page-schedule">Schedule</a>
                    <a href="#" class="nav-link text-slate-300 hover:text-teal-400 font-medium transition" data-page="page-calendar">Calendar</a>
                    <a href="#" class="nav-link text-slate-300 hover:text-teal-400 font-medium transition" data-page="page-resources">Resources</a>
                    <a href="#" class="nav-link text-slate-300 hover:text-teal-400 font-medium transition" data-page="page-profile">Profile</a>
                </nav>
                <div class="flex items-center space-x-4">
                    <div id="currentTime" class="text-lg font-medium text-slate-300 hidden md:block"></div>
                    <button id="logoutBtn" class="p-2 rounded-full hover:bg-red-500/20 text-slate-400 hover:text-red-400 transition" title="Logout">
                         <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="container mx-auto px-4 md:px-6 py-8">
            <main id="page-schedule" class="page"></main>
            <main id="page-calendar" class="page"></main>
            <main id="page-resources" class="page"></main>
            <main id="page-profile" class="page"></main>
        </div>
        
        <!-- Mobile Nav -->
         <nav class="mobile-nav md:hidden fixed bottom-0 left-0 right-0 glass-card rounded-none flex justify-around py-1">
            <a href="#" class="nav-link flex flex-col items-center text-slate-300 hover:text-teal-400 p-2 rounded-lg" data-page="page-schedule"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg><span class="text-xs mt-1">Schedule</span></a>
            <a href="#" class="nav-link flex flex-col items-center text-slate-300 hover:text-teal-400 p-2 rounded-lg" data-page="page-calendar"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"></path><path d="M16 2v4"></path><rect width="18" height="18" x="3" y="4" rx="2"></rect><path d="M3 10h18"></path></svg><span class="text-xs mt-1">Calendar</span></a>
            <a href="#" class="nav-link flex flex-col items-center text-slate-300 hover:text-teal-400 p-2 rounded-lg" data-page="page-resources"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg><span class="text-xs mt-1">Resources</span></a>
             <a href="#" class="nav-link flex flex-col items-center text-slate-300 hover:text-teal-400 p-2 rounded-lg" data-page="page-profile"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span class="text-xs mt-1">Profile</span></a>
        </nav>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-24 md:bottom-5 right-5 text-white py-2 px-5 rounded-lg shadow-xl opacity-0 translate-y-10 transition-all duration-300 glass-card">
        <p>Notification Text</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginView = document.getElementById('loginView');
            const appView = document.getElementById('appView');
            const loginForm = document.getElementById('loginForm');
            const logoutBtn = document.getElementById('logoutBtn');
            const pages = document.querySelectorAll('.page');
            const navLinks = document.querySelectorAll('.nav-link');
            const currentTimeEl = document.getElementById('currentTime');
            const toast = document.getElementById('toast');
            
            let addMedForm, medList, emptyState, profileForm;
            let medications = [], userProfile = {};
            
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value, password = document.getElementById('password').value;
                if (email && password) {
                    loginView.classList.add('hidden');
                    appView.classList.remove('hidden');
                    appView.classList.add('animate-fadeIn');
                    initializeApp();
                } else {
                    showToast('Please provide valid credentials.', true);
                }
            });

            logoutBtn.addEventListener('click', () => {
                appView.classList.add('hidden');
                loginView.classList.remove('hidden');
                loginView.classList.add('animate-fadeIn');
                document.getElementById('loginForm').reset();
            });

            function initializeApp() {
                document.getElementById('page-schedule').innerHTML = `<section class="glass-card p-6 md:p-8 mb-8"><h2 class="text-xl font-semibold mb-4 text-slate-200">New Medication Entry</h2><form id="addMedForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-end"><div><label for="medName" class="block text-sm font-medium text-slate-400 mb-1">Medication Name</label><input type="text" id="medName" placeholder="e.g., Vitamin C" class="w-full px-4 py-2 border border-slate-700 bg-slate-800/50 text-slate-200 rounded-lg focus:ring-2 focus:ring-teal-400 focus:border-teal-400 transition" required></div><div><label for="medDosage" class="block text-sm font-medium text-slate-400 mb-1">Dosage</label><input type="text" id="medDosage" placeholder="e.g., 500mg" class="w-full px-4 py-2 border border-slate-700 bg-slate-800/50 text-slate-200 rounded-lg focus:ring-2 focus:ring-teal-400 focus:border-teal-400 transition"></div><div><label for="medTime" class="block text-sm font-medium text-slate-400 mb-1">Time</label><input type="time" id="medTime" class="w-full px-4 py-2 border border-slate-700 bg-slate-800/50 text-slate-200 rounded-lg focus:ring-2 focus:ring-teal-400 focus:border-teal-400 transition" required></div><button type="submit" class="w-full bg-teal-500 text-white font-semibold py-2 px-4 rounded-lg hover:bg-teal-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-teal-400 transition-all duration-300 transform hover:scale-105 hover:glow-button">Add to Schedule</button></form></section><section id="medListContainer"><h2 class="text-xl font-semibold mb-4 text-slate-200">Today's Regimen</h2><div id="medList" class="space-y-4"><div id="emptyState" class="text-center py-12 px-6 glass-card"><svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mx-auto text-slate-500 mb-4"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg><h3 class="text-lg font-medium text-slate-300">Schedule is Clear.</h3><p class="text-slate-400 mt-1">Add a medication to populate your regimen.</p></div></div></section>`;
                document.getElementById('page-calendar').innerHTML = `<div class="glass-card p-6 md:p-8"><div class="flex justify-between items-center mb-6"><button id="prevMonth" class="p-2 rounded-full hover:bg-slate-700/50">&lt;</button><h2 id="monthYear" class="text-xl font-bold text-slate-100"></h2><button id="nextMonth" class="p-2 rounded-full hover:bg-slate-700/50">&gt;</button></div><div class="grid grid-cols-7 gap-2 text-center font-medium text-slate-400 mb-2"><div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div></div><div id="calendarDays" class="grid grid-cols-7 gap-2"></div></div>`;
                document.getElementById('page-resources').innerHTML = `<div class="glass-card p-6 md:p-8"><h2 class="text-2xl font-bold mb-6 text-slate-100">Information Hub</h2><div class="space-y-4" id="accordionContainer"><div class="border border-slate-700 rounded-lg glass-card"><button class="accordion-header w-full flex justify-between items-center p-4 text-left font-semibold text-slate-200 hover:bg-slate-800/50"><span>Understanding Your Medications</span><span class="transform transition-transform duration-300">&gt;</span></button><div class="accordion-content px-4 pb-4 text-slate-300"><p>Always take your medication as prescribed by your doctor. If you have questions, contact your pharmacist or healthcare provider.</p></div></div><div class="border border-slate-700 rounded-lg glass-card"><button class="accordion-header w-full flex justify-between items-center p-4 text-left font-semibold text-slate-200 hover:bg-slate-800/50"><span>Tips for Adherence</span><span class="transform transition-transform duration-300">&gt;</span></button><div class="accordion-content px-4 pb-4 text-slate-300"><ul class="list-disc list-inside space-y-2"><li>Use a pill organizer.</li><li>Set daily alarms.</li><li>Take medication at the same time each day.</li></ul></div></div></div></div>`;
                document.getElementById('page-profile').innerHTML = `<div class="glass-card p-6 md:p-8"><h2 class="text-2xl font-bold mb-6 text-slate-100">User Profile</h2><form id="profileForm" class="space-y-6"><div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div><label for="userName" class="block text-sm font-medium text-slate-400 mb-1">Full Name</label><input type="text" id="userName" placeholder="e.g., Jane Doe" class="w-full px-4 py-2 border border-slate-700 bg-slate-800/50 text-slate-200 rounded-lg focus:ring-2 focus:ring-teal-400 focus:border-teal-400 transition"></div><div><label for="userAge" class="block text-sm font-medium text-slate-400 mb-1">Age</label><input type="number" id="userAge" placeholder="e.g., 30" class="w-full px-4 py-2 border border-slate-700 bg-slate-800/50 text-slate-200 rounded-lg focus:ring-2 focus:ring-teal-400 focus:border-teal-400 transition"></div></div><div><label for="userEmergencyContact" class="block text-sm font-medium text-slate-400 mb-1">Emergency Contact</label><input type="text" id="userEmergencyContact" placeholder="e.g., John Doe - 555-123-4567" class="w-full px-4 py-2 border border-slate-700 bg-slate-800/50 text-slate-200 rounded-lg focus:ring-2 focus:ring-teal-400 focus:border-teal-400 transition"></div><div class="pt-2"><button type="submit" class="w-full md:w-auto bg-teal-500 text-white font-semibold py-3 px-6 rounded-lg hover:bg-teal-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-teal-400 transition-all duration-300 transform hover:scale-105 hover:glow-button">Save Profile</button></div></form></div>`;
                
                addMedForm = document.getElementById('addMedForm');
                medList = document.getElementById('medList');
                emptyState = document.getElementById('emptyState');
                profileForm = document.getElementById('profileForm');
                
                medications = JSON.parse(localStorage.getItem('medications')) || [];
                userProfile = JSON.parse(localStorage.getItem('userProfile')) || {};

                navLinks.forEach(link => link.addEventListener('click', (e) => { e.preventDefault(); showPage(link.dataset.page); }));
                
                loadProfile();
                profileForm.addEventListener('submit', handleProfileSave);
                addMedForm.addEventListener('submit', handleAddMed);
                medList.addEventListener('click', handleMedListClick);
                document.querySelectorAll('.accordion-header').forEach(header => header.addEventListener('click', handleAccordion));
                renderCalendar();
                document.getElementById('prevMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); });
                document.getElementById('nextMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); });

                updateTime();
                setInterval(updateTime, 1000 * 60);
                renderMedications();
                showPage('page-schedule');
            }

            function showPage(pageId) {
                pages.forEach(page => page.classList.remove('active'));
                document.getElementById(pageId).classList.add('active');
                navLinks.forEach(link => {
                    link.classList.remove('active');
                    if(link.dataset.page === pageId) link.classList.add('active');
                });
            }

            const saveMedications = () => localStorage.setItem('medications', JSON.stringify(medications));
            const saveProfile = () => localStorage.setItem('userProfile', JSON.stringify(userProfile));
            
            const loadProfile = () => {
                document.getElementById('userName').value = userProfile.name || '';
                document.getElementById('userAge').value = userProfile.age || '';
                document.getElementById('userEmergencyContact').value = userProfile.emergencyContact || '';
            };
            
            function handleProfileSave(e) {
                e.preventDefault();
                userProfile = { name: document.getElementById('userName').value, age: document.getElementById('userAge').value, emergencyContact: document.getElementById('userEmergencyContact').value };
                saveProfile();
                showToast('Profile synchronized.');
            }

            function renderMedications() {
                medList.innerHTML = ''; 
                if (medications.length === 0) {
                    medList.appendChild(emptyState);
                    emptyState.style.display = 'block';
                } else {
                    emptyState.style.display = 'none';
                    medications.sort((a, b) => a.time.localeCompare(b.time));
                    medications.forEach(med => medList.appendChild(createMedCard(med)));
                }
            }

            function createMedCard(med) {
                const medCard = document.createElement('div');
                medCard.className = `med-card flex items-center justify-between p-4 rounded-lg border-l-4 transition-all duration-300 glass-card ${med.isTaken ? 'pill-taken' : 'border-teal-400'}`;
                medCard.dataset.id = med.id;
                medCard.innerHTML = `<div class="flex items-center"><div class="text-xl font-bold text-teal-400 w-24">${formatTime(med.time)}</div><div class="ml-4"><p class="med-name font-semibold text-lg text-slate-100">${med.name}</p><p class="med-dosage text-slate-400">${med.dosage || ''}</p></div></div><div class="flex items-center space-x-2"><button class="toggle-taken-btn p-2 rounded-full transition ${med.isTaken ? 'bg-teal-500/30 text-teal-400' : 'bg-slate-700/50 hover:bg-teal-500/30 text-slate-400'}" title="Mark as Taken"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button><button class="delete-btn p-2 rounded-full bg-slate-700/50 hover:bg-red-500/20 text-slate-400 hover:text-red-400 transition" title="Delete"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div>`;
                return medCard;
            }

            function handleAddMed(e) {
                e.preventDefault();
                medications.push({ id: Date.now(), name: document.getElementById('medName').value, dosage: document.getElementById('medDosage').value, time: document.getElementById('medTime').value, isTaken: false });
                saveMedications();
                renderMedications();
                showToast(`"${document.getElementById('medName').value}" added to regimen.`);
                addMedForm.reset();
            }

            function handleMedListClick(e) {
                const button = e.target.closest('button');
                if (!button) return;
                const medCard = button.closest('.med-card');
                const medId = parseInt(medCard.dataset.id);
                if (button.classList.contains('delete-btn')) {
                    medCard.classList.add('animate-slideOut');
                    medCard.addEventListener('animationend', () => {
                        medications = medications.filter(m => m.id !== medId);
                        saveMedications();
                        renderMedications();
                    }, { once: true });
                } else if (button.classList.contains('toggle-taken-btn')) {
                    const med = medications.find(m => m.id === medId);
                    if (med) { med.isTaken = !med.isTaken; saveMedications(); renderMedications(); }
                }
            }
            
            function handleAccordion(e) {
                const header = e.currentTarget;
                const content = header.nextElementSibling;
                const icon = header.querySelector('span:last-child');
                document.querySelectorAll('.accordion-content').forEach(c => {
                    if (c !== content) {
                        c.style.maxHeight = null;
                        c.previousElementSibling.querySelector('span:last-child').style.transform = 'rotate(0deg)';
                    }
                });
                if (content.style.maxHeight) {
                    content.style.maxHeight = null;
                    icon.style.transform = 'rotate(0deg)';
                } else {
                    content.style.maxHeight = content.scrollHeight + 'px';
                    icon.style.transform = 'rotate(90deg)';
                }
            }

            let currentDate = new Date();
            function renderCalendar() {
                const month = currentDate.getMonth(), year = currentDate.getFullYear();
                document.getElementById('monthYear').textContent = `${currentDate.toLocaleString('default', { month: 'long' })} ${year}`;
                const calendarDaysEl = document.getElementById('calendarDays');
                calendarDaysEl.innerHTML = '';
                const firstDayOfMonth = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const today = new Date();
                for (let i = 0; i < firstDayOfMonth; i++) calendarDaysEl.innerHTML += `<div></div>`;
                for (let i = 1; i <= daysInMonth; i++) {
                    let isToday = i === today.getDate() && month === today.getMonth() && year === today.getFullYear();
                    calendarDaysEl.innerHTML += `<div class="h-10 w-10 flex items-center justify-center rounded-full transition-colors mx-auto ${isToday ? 'bg-teal-500 text-white font-bold shadow-lg glow-button' : 'hover:bg-slate-700/50 cursor-pointer'}">${i}</div>`;
                }
            }

            const updateTime = () => { currentTimeEl.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); };
            const formatTime = (timeString) => { const [h, m] = timeString.split(':'); return new Date(1970,0,1,h,m).toLocaleTimeString('en-US',{hour:'numeric',minute:'numeric',hour12:true}); };
            const showToast = (message, isError = false) => {
                toast.querySelector('p').textContent = message;
                toast.style.borderColor = isError ? 'rgba(239, 68, 68, 0.5)' : 'rgba(34, 197, 94, 0.5)'; // red-500 or green-500
                toast.classList.remove('opacity-0', 'translate-y-10');
                setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-10'); }, 3000);
            };
        });
    </script>
</body>
</html>
